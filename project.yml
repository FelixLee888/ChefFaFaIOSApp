name: ChefFaFaIOSApp
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  ChefFaFaIOSApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChefFaFaIOSApp
    resources:
      - path: ChefFaFaIOSApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chieffafa.iosapp
        PRODUCT_NAME: ChefFaFaIOSApp
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Chef Fafa
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - ChefFaFaIOSAppTests

  ChefFaFaIOSAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ChefFaFaIOSAppTests
    dependencies:
      - target: ChefFaFaIOSApp

